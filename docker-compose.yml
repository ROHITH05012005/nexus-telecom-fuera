version: '3.8'

services:
  churn-dashboard:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - API_KEY=${API_KEY:-changeme}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SENDER=${SMTP_SENDER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ALERT_RECIPIENTS=${ALERT_RECIPIENTS:-}
    restart: unless-stopped
